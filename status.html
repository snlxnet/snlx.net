<!doctype html>
<html>

<head>
    <title>sld | snlx.net</title>
    <link rel="stylesheet" href="/new.css">
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="color-scheme" content="light dark">
    <meta name="description" content="Digital Garden Note">
    <style>
      .card {
        display: flex;
        flex-direction: column;
        justify-content: space-between;
        background: #181825;
        width: 100vw;
        aspect-ratio: 21 / 9;
        padding: 0 2rem;
      }
    </style>
</head>

<body>
  <div class="card">
      <div style="display: flex; justify-content: space-between; align-items: center">
          <h2>
              Timer
              <span id="state" style="color: var(--accent)"></span>
          </h2>
          <p>
              <span id="countdown">--:--</span>
              left
          </p>
      </div>
      <div>
        <p>
            <span id="action">Offline</span>
            <a id="link"></a>
        </p>
        <p>
            Location:
            <span id="geolocation">Unknown</span>
        </p>
      </div>
  </div>

  <script>
    function main() {
      const socket = new WebSocket("wss://api.snlx.net/status")
      console.log(socket)
      socket.addEventListener("message", ({data}) => {
        const now = new Date()
        let {action, link, location, duration, started} = JSON.parse(data)
        started = new Date(started)
        duration = decodeURIComponent(duration)

        if (duration.startsWith("+pomo")) {
          pomodoroDispatcher({started, action, link, location})
        } else if (duration.startsWith("+")) {
          const lastsForMinutes = +duration.slice(1)
          const endsAt = started
          endsAt.setMinutes(started.getMinutes() + lastsForMinutes)

          const endsInMinutes = (endsAt - now) / 1000 / 60
          dispatchTimerUpdate({endsInMinutes, endsAt, action, link, location})
        }
      })
    }

    function pomodoroDispatcher({started, action, link, location}) {
      const now = new Date()

      const minutesSinceStart = (now - started) / 1000 / 60
      const minutesSinceBreak = minutesSinceStart % 30
      const currentPhase = minutesSinceBreak < 25 ? "work" : "break"

      const nextWorkIn = 30 - minutesSinceBreak
      const nextBreakIn = currentPhase === "work" ? 25 - minutesSinceBreak : 55 - minutesSinceBreak

      const nextPhaseIn = currentPhase === "work" ? nextBreakIn : nextWorkIn
      let nextPhaseAt = new Date(now.getTime() + nextPhaseIn * 60 * 1000)
      dispatchTimerUpdate({
        endsInMinutes: nextPhaseIn,
        endsAt: nextPhaseAt,
        action: currentPhase === "break" ? "break" : action,
        link,
        location,
        phase: currentPhase === "work" ? "🍅" : "🏖️",
      })

      const timeout = nextPhaseIn * 60 * 1000 + 100
      setTimeout(() => pomodoroDispatcher({started, action, link, location}), timeout)
    }

    function dispatchTimerUpdate({endsInMinutes, endsAt, action, link, location, phase}) {
      document.body.dispatchEvent(
        new CustomEvent("timerupdate", {
          bubbles: true,
          detail: {
            endsInMinutes: endsInMinutes >= 0 ? endsInMinutes : null,
            endsAt: endsAt - new Date() > 0 ? endsAt : null,
            action,
            link,
            location,
            phase,
          },
        })
      )
    }

    let intervalId = 0;
    document.addEventListener("timerupdate", ({detail}) => {
      clearInterval(intervalId)

      if (!detail.endsAt) {
        die()
        return
      }

      state.textContent = "running " + (detail.phase || "")
      action.textContent = detail.action
      link.textContent = detail.link
      link.href = detail.link ? "/" + detail.link : "#"
      geolocation.textContent = detail.location || "Unknown"

      intervalId = setInterval(() => {
        const ms = detail.endsAt - new Date()
        if (ms <= 0) {
          die()
          return
        }

        let seconds = ms / 1000
        const minutes = Math.floor(seconds / 60)
        seconds = Math.floor(seconds % 60)

        countdown.textContent = pad(minutes) + ":" + pad(seconds)
      }, 200)

      console.log(detail)
    })

    function die() {
      state.textContent = "stopped"
      countdown.textContent = "--:--"
      action.textContent = "Offline"
      link.textContent = ""
      link.href = "#"
      geolocation.textContent = "Unknown"
      clearInterval(intervalId)
    }

    main()

    function pad(number) {
      return ("00" + (number || 0)).slice(-2)
    }
  </script>
</body>

</html>
