<style>
  body {
    background: #181825;
    display: flex;
    align-items: center;
    margin: 0;
    height: 100vh;
  }

  @font-face {
    font-family: "JetBrains Mono";
    src: url("/deps/fonts/jetbrains_mono.ttf");
  }
  #waves {
    transform: translateX(0);
  }
  #status, #timer, #preposition, #location {
    font-family: "JetBrains Mono";
    font-size: 1em;
    font-weight: bold;
    transition: fill 1s ease-in-out;
  }
  a {
    text-decoration: underline;
    &:hover {
      text-decoration: none;
    }
  }
</style>

<svg id="status" style="background: #181825" viewBox="0 0 210 90">
  <path
    id="wavypath"
  ></path>

  <rect
    x="80"
    y="0"
    width="150%"
    height="150%"
    fill="#181825"
  ></rect>
  <text
    x="40"
    y="30"
    fill="#181825"
    dominant-baseline="middle"
    text-anchor="middle"
    id="timer"
  >
    00:00
  </text>
  <text
    x="40"
    y="78"
    fill="#181825"
    dominant-baseline="middle"
    text-anchor="middle"
    id="status"
  >
    working
  </text>

  <text
    x="85"
    y="78"
    fill="#cdd6f4"
    dominant-baseline="middle"
    id="preposition"
  >
    on

    <a
      id="project"
    >
      ...
    </a>
  </text>

  <text
    x="188"
    y="15"
    fill="#cdd6f4"
    dominant-baseline="middle"
    text-anchor="end"
    id="location"
  >
    location
  </text>
  <svg x="192" y="8" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="#cdd6f4" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-map-pin-icon lucide-map-pin">
    <path d="M20 10c0 4.993-5.539 10.193-7.399 11.799a1 1 0 0 1-1.202 0C9.539 20.193 4 14.993 4 10a8 8 0 0 1 16 0"/>
    <circle cx="12" cy="10" r="3"/>
  </svg>
</svg> 

<script>
frame()

function frame() {
  const waves = 100
  const seconds = 5*60
  const accent = "#74c7ec"
  const note = "trk"

  countdown(seconds)
  function countdown(left) {
    const s = left % 60
    const m = Math.floor(left / 60)
    timer.textContent = `${pad(m)}:${pad(s)}`

    if (left === 0) {
      return;
    }

    if (left < seconds*0.75) {
      timer.style.fill = accent
    }

    setTimeout(() => countdown(left-1), 1000)
  }

  const wave = `
    q 20,10
      40,00
    q 20,-10
      40,00
  `
  wavypath.setAttribute(
    "d",
    `
      M 00,-10

      ${wave.repeat(waves)}

      l 00,110
      L 00,90
      Z
    `
  )
  wavypath.style.fill = accent
  wavypath.style.transition = `ease-out ${seconds}s`
  setTimeout(() => wavypath.style.transform = `translate(-${80*(waves-1)}px, 100px)`, 100)
  setTimeout(() => wavypath.style.transform = `translate(-${80*(waves-1)}px, 120px)`, seconds * 1000)

  project.setAttribute("href", "/" + note)
  project.textContent = note
  project.style.fill = accent
}

function pad(number) {
  return ("00" + (number || 0)).slice(-2)
}
</script>
