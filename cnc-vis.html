<!doctype html>
<html lang="ru">
<head>
    <title>CNC Visualizer Demo | snlx.net</title>
    <link rel="stylesheet" href="./cnc-vis.css">
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="color-scheme" content="light dark">
    <meta name="description" content="A quick project I did at the uni for generating & visualizing G-Code">
</head>
<body>
  <header id="info">
    <h1>Визуализатор / Генератор G-Code</h1>
    <p>Эксперементальный проект студента КубГТУ</p>
  </header>

  <textarea id="input">
l1 = 80.5
l2 = 18
l3 = 29.5
d1 = 135
d2 = 27
d3 = 61.5
d4 = 90
r1 = 2.5
r2 = 6.5
dx2 = 5
dz2 = 2
dx3 = 32
dz3 = 40
запас = 10

прыг(0, d4 - запас)
режь(0, d4 + 3*r1)
кружисьОбратно(r1, -r1, d4 + 4*r1)
режь(-l3 +r2, d4 + 4*r1)
кружись(r2, -l3, d4 + 4*r1 + r2)
режь(-l3, d1)
режь(-l3 -l2 -запас, d1)
режь(-l3 - l2 -запас, d1 +запас)
нуль()

прыг(запас, d4)
режь(-l2, d4)
режь(-l2, d3)
режь(-l2*2 +r2, d2 + 2*r2)
кружисьОбратно(r2, -l2*2, d2)
режь(-l2*3 -запас, d2)
режь(-l2*3 -запас, d2 -запас)
прыг(запас, d2 -запас)
нуль()
  </textarea>
  
  <div id="output">
    <pre id="display"></pre>

    <svg id="svg" viewBox="0 0 100 100">
      <rect id="desk"></rect>
      <circle id="zerocircle" cx="0" cy="0" r="5"></circle>
      <path id="zeropath">
      </path>
    </svg>
  </div>

  <script src="./cnc-vis.js"></script>
</body>
</html>
